<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-5 Kasa Defteri</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        /* Standalone page styles */
        body { padding: 20px; overflow: hidden; }
        .app-container { height: calc(100vh - 80px); display: flex; justify-content: center; overflow: hidden; }
        .resize-container { width: 100%; max-width: 1400px; display: block; overflow: hidden; }
        .bankroll-panel { flex: none; width: 100%; min-width: unset; height: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 30px; }
        .global-stats { justify-content: center; gap: 40px; margin-bottom: 30px; }
        .stat-box { min-width: 250px; }
        .table-container { max-height: calc(100vh - 280px); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; }
        thead th { position: sticky; top: 0; background: #23232b; z-index: 10; font-size: 0.95rem; padding: 15px !important; }
        tbody td { padding: 12px 15px !important; font-size: 1rem; }
        input.editable, select.editable, input.profit-input { font-size: 1rem; padding: 5px; }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-left">
            <span class="toolbar-brand"><i class="fa-solid fa-wallet"></i> B-5 Kasa Defteri</span>
            <a href="dashboard.html" style="margin-left: 20px; color: #a1a1aa; text-decoration: none; padding: 5px 10px; border-radius: 4px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s;"><i class="fa-solid fa-arrow-left"></i> Dashboard'a Dön</a>
        </div>
    </div>

    <div class="app-container">
        <div class="resize-container">
            <section class="bankroll-panel glass-panel" id="col-bankroll">
                <div class="panel-header" style="justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 25px;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <h2 style="font-size: 1.5rem; margin:0;"><i class="fa-solid fa-wallet" style="color:#60a5fa"></i> Kasa Yönetimi</h2>
                    </div>
                    <div class="panel-header-btns">
                        <button class="btn btn-primary" id="add-manual-btn" style="font-size: 1rem; padding: 8px 16px;"><i class="fa-solid fa-plus"></i> Manuel Ekle</button>
                        <button class="toolbar-btn" id="btn-export-excel" title="Excel olarak dışa aktar"><i class="fa-solid fa-file-excel" style="color:#4ade80"></i> Excel</button>
                        <button class="toolbar-btn" id="btn-export-pdf" title="PDF olarak dışa aktar"><i class="fa-solid fa-file-pdf" style="color:#f87171"></i> PDF</button>
                    </div>
                </div>

                <!-- Global Stats -->
                <div class="global-stats">
                    <div class="stat-box">
                        <span class="stat-label">BAŞLANGIÇ SERMAYESİ</span>
                        <input type="number" id="initial-capital" class="capital-input" value="100.00" step="10" style="font-size: 1.3rem;">
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">GÜNCEL KASA</span>
                        <span class="stat-value text-green" id="current-capital" style="font-size: 1.6rem;">$100.00</span>
                    </div>
                    <div class="stat-box primary-stat" style="background: rgba(16, 185, 129, 0.1);">
                        <span class="stat-label">NET KAZANÇ</span>
                        <div class="stat-values">
                            <span class="stat-value" id="net-profit-val" style="font-size: 1.6rem;">$0.00</span>
                            <span class="stat-pct" id="net-profit-pct" style="font-size: 1.1rem; font-weight: bold;">0.00%</span>
                        </div>
                    </div>
                </div>

                <!-- Bankroll Table -->
                <div class="table-container">
                    <table class="bankroll-table" id="bankroll-table">
                        <thead>
                            <tr>
                                <th>COIN</th>
                                <th>TARİH</th>
                                <th>SAAT</th>
                                <th>POZ</th>
                                <th>KAZANÇ ($)</th>
                                <th>KASA ($)</th>
                                <th>YÜZDE (%)</th>
                                <th><i class="fa-solid fa-trash"></i></th>
                            </tr>
                        </thead>
                        <tbody id="bankroll-body">
                            <!-- Rows injected via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="js/bankroll.js"></script>
</body>
</html>
